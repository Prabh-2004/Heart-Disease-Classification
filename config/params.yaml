params: 

  SVC: 
    C: [0.1, 1, 10]
    kernel: ["linear", "rbf"]
    gamma: ["scale", "auto"]

  RandomForestClassifier: 
    n_estimators: [100, 200, 300]
    max_depth: [None, 10, 20]
    min_samples_split: [2, 5]
    min_samples_leaf: [1, 2]
    max_features: ["sqrt", "log2"]

  XGBClassifier:
    n_estimators: [100, 200, 300]
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.1]
    subsample: [0.8, 1]
    colsample_bytree: [0.8, 1]
    gamma: [0, 0.1]
